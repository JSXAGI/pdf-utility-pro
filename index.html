<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Utility Pro - Final Refined</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <style>
        :root { --primary: #1a73e8; --bg: #333333; --card: #ffffff; }
        body { font-family: 'Segoe UI', 'Meiryo', sans-serif; background-color: var(--bg); padding: 40px 20px; color: #3c4043; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: #00B0FF; font-size: 2.4rem; margin: 0; letter-spacing: -1px; }
        .badge { background: #e8f0fe; color: #1a73e8; padding: 4px 12px; border-radius: 4px; font-size: 0.8rem; margin-top: 10px; display: inline-block; font-weight: 500; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 8px; padding: 24px; box-shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); transition: box-shadow 0.2s; }
        .card:hover { box-shadow: 0 4px 8px rgba(60,64,67,0.3); }
        .card h3 { color: #202124; margin-top: 0; font-size: 1.2rem; }
        .card p { font-size: 0.9rem; color: #5f6368; line-height: 1.5; }
        .card-large { grid-column: span 2; display: flex; gap: 20px; align-items: center; }
        @media (max-width: 800px) { .card-large { grid-column: span 1; flex-direction: column; align-items: flex-start; } }
        .logo-upload-box { background: #f8f9fa; border: 2px dashed #dadce0; padding: 15px; border-radius: 8px; width: 180px; text-align: center; }
        #logoPreview { max-width: 100%; height: auto; border-radius: 4px; margin-top: 10px; display: none; }
        input[type="file"] { display: none; }
        .btn { background: var(--primary); color: white; padding: 10px 20px; border-radius: 4px; cursor: pointer; display: inline-block; text-decoration: none; font-weight: 500; border: none; font-size: 0.9rem; }
        .btn:hover { background: #1765cc; }
        .btn-sub { background: #f1f3f4; color: #3c4043; border: 1px solid #dadce0; margin-top: 8px; }
        #status-panel { display: none; background: white; border-radius: 8px; padding: 24px; text-align: center; margin-bottom: 30px; border: 1px solid #dadce0; }
        progress { width: 100%; height: 8px; margin: 15px 0; border-radius: 4px; }
        progress::-webkit-progress-bar { background-color: #f1f3f4; border-radius: 4px; }
        progress::-webkit-progress-value { background-color: var(--primary); border-radius: 4px; }
        #preview-section { display: none; margin-top: 30px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .img-card { background: white; padding: 8px; border-radius: 4px; border: 1px solid #dadce0; text-align: center; }
        .img-card img { width: 100%; height: auto; border-bottom: 1px solid #f1f3f4; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PDF Utility Pro</h1>
        <div class="badge">Local & Private Device Processing</div>
    </header>

    <div id="status-panel">
        <h2 id="status-text" style="font-size: 1.1rem; margin: 0;"></h2>
        <progress id="mainBar" value="0" max="100"></progress>
        <div id="dl-area"></div>
    </div>

    <div class="grid">
        <div class="card card-large">
            <div class="logo-upload-box">
                <p style="font-size: 0.75rem; margin-bottom: 8px; color: #5f6368;">ロゴ画像を配置</p>
                <label class="btn btn-sub" style="font-size: 0.75rem; padding: 6px 12px;">選択<input type="file" id="logoInput" accept="image/*"></label>
                <img id="logoPreview">
            </div>
            <div>
                <h3>🖼️ 画像変換 & ロゴ合成</h3>
                <p>各ページを画像化。ロゴを設定すれば全ページに合成されます。</p>
                <label class="btn">PDFを選択<input type="file" id="toImage" accept=".pdf"></label>
            </div>
        </div>

        <div class="card">
            <h3>📝 高品質Word抽出</h3>
            <p>テキストを座標解析し、段落を維持したまま変換します。</p>
            <label class="btn">PDFを選択<input type="file" id="toWord" accept=".pdf"></label>
        </div>

        <div class="card">
            <h3>🔗 PDF結合</h3>
            <p>複数のPDFを、選択順に1つにまとめます。</p>
            <label class="btn">PDFを選択<input type="file" id="toMerge" accept=".pdf" multiple></label>
        </div>

        <div class="card">
            <h3>🛡️ 匿名化</h3>
            <p>メタデータを削除し、個人情報を保護します。</p>
            <label class="btn">PDFを選択<input type="file" id="toClean" accept=".pdf"></label>
        </div>
    </div>

    <div id="preview-section">
        <h3 style="font-size: 1rem; color: #202124;">プレビュー</h3>
        <div id="gallery" class="gallery"></div>
    </div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let logoImg = null;

    document.getElementById('logoInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    logoImg = img;
                    const preview = document.getElementById('logoPreview');
                    preview.src = ev.target.result;
                    preview.style.display = 'block';
                };
            };
            reader.readAsDataURL(file);
        }
    };

    function uiStart(msg) {
        document.getElementById('status-panel').style.display = 'block';
        document.getElementById('status-text').innerText = msg;
        document.getElementById('dl-area').innerHTML = '';
        document.getElementById('mainBar').value = 0;
        document.getElementById('preview-section').style.display = 'none';
    }

    function uiDone(msg, html) {
        document.getElementById('status-text').innerText = msg;
        document.getElementById('dl-area').innerHTML = html;
        document.getElementById('mainBar').value = 100;
    }

    // ① 画像変換エンジン
    document.getElementById('toImage').onchange = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        uiStart("画像を生成中...");
        const zip = new JSZip();
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';

        try {
            const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport }).promise;

                if (logoImg) {
                    const lw = viewport.width * 0.15;
                    const lh = (logoImg.height / logoImg.width) * lw;
                    ctx.globalAlpha = 0.5;
                    ctx.drawImage(logoImg, viewport.width - lw - 20, viewport.height - lh - 20, lw, lh);
                }

                const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                const url = URL.createObjectURL(blob);
                const fileName = `image_page_${i}.png`; // ファイル名をより安全なものに
                zip.file(fileName, blob);

                const div = document.createElement('div');
                div.className = 'img-card';
                div.innerHTML = `<img src="${url}"><br><a href="${url}" download="${fileName}" class="btn btn-sub" style="font-size:0.7rem; padding:4px 8px;">保存</a>`;
                gallery.appendChild(div);
                document.getElementById('mainBar').value = (i / pdf.numPages) * 100;
            }
            // 圧縮設定を明示してセキュリティブロックを回避
            const zipContent = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: { level: 6 } });
            const zipUrl = URL.createObjectURL(zipContent);
            uiDone("完了！", `<a href="${zipUrl}" download="pdf_images.zip" class="btn">まとめて保存 (ZIP)</a>`);
            document.getElementById('preview-section').style.display = 'block';
        } catch (err) { alert(err); }
    };

// ② 高品質Word抽出エンジン（接着剤アルゴリズム・修正完遂版）
    document.getElementById('toWord').onchange = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        uiStart("精密テキスト接着中...");
        try {
            const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
            const allDocChildren = [];

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                // 1. 全アイテムを「行」としてグループ化する（OCR的スキャン）
                const lines = {};
                textContent.items.forEach(item => {
                    // Y座標を5px単位で丸めて「同じ行」とみなす
                    const y = Math.round(item.transform[5] / 5) * 5;
                    if (!lines[y]) lines[y] = [];
                    lines[y].push(item);
                });

                // 2. Y座標が高い順（上から下）にソート
                const sortedY = Object.keys(lines).sort((a, b) => b - a);
                
                let currentParaRuns = [];
                let lastY = null;

                for (let y of sortedY) {
                    // 同じ行内の文字をX座標順（左から右）に並べて接着
                    const rowText = lines[y].sort((a, b) => a.transform[4] - b.transform[4])
                                           .map(item => item.str).join('');
                    
                    if (rowText.trim().length === 0) continue;

                    const currentY = parseFloat(y);
                    // 3. 前の行との距離が近い(20px以内)場合は、同じ段落にまとめる
                    if (lastY !== null && Math.abs(lastY - currentY) > 20) {
                        // 距離が離れたので、これまでのテキストを段落として確定
                        allDocChildren.push(new docx.Paragraph({
                            children: currentParaRuns,
                            spacing: { after: 120 }
                        }));
                        currentParaRuns = [];
                    }
                    
                    // テキストを追加
                    currentParaRuns.push(new docx.TextRun({ text: rowText, font: "MS Mincho" }));
                    lastY = currentY;
                }

                // ページ末尾の残りを段落にする
                if (currentParaRuns.length > 0) {
                    allDocChildren.push(new docx.Paragraph({
                        children: currentParaRuns,
                        spacing: { after: 120 }
                    }));
                }

                // 4. 改ページ処理
                if (i < pdf.numPages) {
                    allDocChildren.push(new docx.Paragraph({ children: [new docx.PageBreak()] }));
                }
                document.getElementById('mainBar').value = (i / pdf.numPages) * 100;
            }

            // docxライブラリの正しい構造に流し込む
            const doc = new docx.Document({
                sections: [{
                    properties: {},
                    children: allDocChildren
                }]
            });

            const blob = await docx.Packer.toBlob(doc);
            uiDone("リベンジ完了！", `<a href="${URL.createObjectURL(blob)}" download="${file.name.replace('.pdf', '.docx')}" class="btn">Wordを保存</a>`);
        } catch (err) { 
            console.error(err);
            alert("変換エラー: " + err.message); 
        }
    };
	
    // ③ PDF結合
    document.getElementById('toMerge').onchange = async (e) => {
        const files = Array.from(e.target.files); if (files.length < 2) return;
        uiStart("PDFを結合中...");
        try {
            const merged = await PDFLib.PDFDocument.create();
            for (const f of files) {
                const doc = await PDFLib.PDFDocument.load(await f.arrayBuffer());
                const pages = await merged.copyPages(doc, doc.getPageIndices());
                pages.forEach(p => merged.addPage(p));
            }
            const blob = new Blob([await merged.save()], { type: 'application/pdf' });
            uiDone("結合完了！", `<a href="${URL.createObjectURL(blob)}" download="merged.pdf" class="btn">結合PDFを保存</a>`);
        } catch (err) { alert(err); }
    };

    // ④ 匿名化
    document.getElementById('toClean').onchange = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        uiStart("メタデータ削除中...");
        try {
            const doc = await PDFLib.PDFDocument.load(await file.arrayBuffer());
            doc.setTitle(''); doc.setAuthor(''); doc.setSubject(''); doc.setCreator(''); doc.setProducer('');
            const blob = new Blob([await doc.save()], { type: 'application/pdf' });
            uiDone("完了！", `<a href="${URL.createObjectURL(blob)}" download="cleaned.pdf" class="btn">保存</a>`);
        } catch (err) { alert(err); }
    };
</script>

</body>
</html>
