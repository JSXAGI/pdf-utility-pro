<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Utility Pro</title>
    <link rel="stylesheet" href="./src/style.css">
    <link rel="manifest" href="./manifest.json">
    
    <script type="importmap">
  {
    "imports": {
      "pdfjs-dist": "https://esm.run/pdfjs-dist@4.4.168",
      "pdf-lib": "https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.esm.min.js",
      "docx": "https://esm.run/docx@8.5.0",
      "jszip": "https://esm.run/jszip@3.10.1"
    }
  }
</script>
</head>
<body>

<div class="container">
    <header>
        <h1>PDF Utility Pro</h1>
        <div class="badge">Local & Private Device Processing</div>
    </header>

    <div id="status-panel">
        <h2 id="status-text"></h2>
        <progress id="mainBar" value="0" max="100"></progress>
        <div id="dl-area"></div>
    </div>

    <div class="grid">
        <div class="card card-large">
            <div class="logo-upload-box">
                <p class="hint-text">ロゴ画像を配置</p>
                <label class="btn btn-sub btn-small">選択<input type="file" id="logoInput" accept="image/*" class="hidden-input"></label>
                <img id="logoPreview" alt="Logo Preview">
            </div>
            <div class="card-content">
                <h3>🖼️ 画像変換 & ロゴ合成</h3>
                <p>各ページを画像化。ロゴを設定すれば全ページに合成されます。</p>
                <label class="btn">PDFを選択<input type="file" id="toImage" accept=".pdf" class="hidden-input"></label>
            </div>
        </div>

        <div class="card">
            <h3>📝 高品質Word抽出</h3>
            <p>テキストを座標解析し、段落を維持したまま変換します。</p>
            <label class="btn">PDFを選択<input type="file" id="toWord" accept=".pdf" class="hidden-input"></label>
        </div>

        <div class="card">
            <h3>🔗 PDF結合</h3>
            <p>複数のPDFを、選択順に1つにまとめます。</p>
            <label class="btn">PDFを選択<input type="file" id="toMerge" accept=".pdf" multiple class="hidden-input"></label>
        </div>

        <div class="card">
            <h3>🛡️ 匿名化</h3>
            <p>メタデータを削除し、個人情報を保護します。</p>
            <label class="btn">PDFを選択<input type="file" id="toClean" accept=".pdf" class="hidden-input"></label>
        </div>
    </div>

    <div id="preview-section">
        <h3>プレビュー</h3>
        <div id="gallery" class="gallery"></div>
    </div>
</div>

<script type="module" src="./src/main.js"></script>

<script>
  // Service Workerの登録（クリーンな状態を保つようエラーログを明確化）
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker: 正常に起動しました'))
        .catch(err => console.error('Service Worker: 起動失敗', err));
    });
  }
</script>
</body>
</html>
