<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Utility Pro</title>
  <script type="module" crossorigin src="/assets/index-DyKGARQQ.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-C85jYxGV.css">
<link rel="manifest" href="/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/registerSW.js"></script></head>
<body>

<div class="container">
    <header>
        <h1>PDF Utility Pro</h1>
        <div class="badge">Local & Private Device Processing</div>
    </header>

    <div id="status-panel">
        <h2 id="status-text" style="font-size: 1.1rem; margin: 0;"></h2>
        <progress id="mainBar" value="0" max="100"></progress>
        <div id="dl-area"></div>
    </div>

    <div class="grid">
        <div class="card card-large">
            <div class="logo-upload-box">
                <p style="font-size: 0.75rem; margin-bottom: 8px; color: #5f6368;">ロゴ画像を配置</p>
                <label class="btn btn-sub" style="font-size: 0.75rem; padding: 6px 12px;">選択<input type="file" id="logoInput" accept="image/*"></label>
                <img id="logoPreview">
            </div>
            <div>
                <h3>🖼️ 画像変換 & ロゴ合成</h3>
                <p>各ページを画像化。ロゴを設定すれば全ページに合成されます。</p>
                <label class="btn">PDFを選択<input type="file" id="toImage" accept=".pdf"></label>
            </div>
        </div>

        <div class="card">
            <h3>📝 高品質Word抽出</h3>
            <p>テキストを座標解析し、段落を維持したまま変換します。</p>
            <label class="btn">PDFを選択<input type="file" id="toWord" accept=".pdf"></label>
        </div>

        <div class="card">
            <h3>🔗 PDF結合</h3>
            <p>複数のPDFを、選択順に1つにまとめます。</p>
            <label class="btn">PDFを選択<input type="file" id="toMerge" accept=".pdf" multiple></label>
        </div>

        <div class="card">
            <h3>🛡️ 匿名化</h3>
            <p>メタデータを削除し、個人情報を保護します。</p>
            <label class="btn">PDFを選択<input type="file" id="toClean" accept=".pdf"></label>
        </div>
    </div>

    <div id="preview-section">
        <h3 style="font-size: 1rem; color: #202124;">プレビュー</h3>
        <div id="gallery" class="gallery"></div>
    </div>
</div>

</body>
</html>
